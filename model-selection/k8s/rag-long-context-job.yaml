# Model Selection suite — "RAG / Long-Context Q&A" scenario, run as a K8s Job.
#
# The script itself (model-selection/run_rag_long_context.sh) is the
# source of truth for the aiperf invocation — this manifest just mounts it
# (plus its sample prompts file) into the NGC AIPerf image and supplies
# config via env vars, since the pod has no TTY for the script's
# interactive prompts.
#
# This suite shares ONE PersistentVolumeClaim across all model-selection
# scenario Jobs (see results-pvc.yaml) — each scenario writes to its own
# OUTPUT_DIR subpath on that shared claim rather than getting its own PVC.
#
# Usage:
#   kubectl apply -f model-selection/k8s/results-pvc.yaml -n <namespace>   # once per namespace
#   kubectl create configmap aiperf-rag-long-context-script \
#     --from-file=run_rag_long_context.sh=model-selection/run_rag_long_context.sh \
#     -n <namespace>
#   kubectl create configmap aiperf-rag-long-context-prompts \
#     --from-file=rag_long_context.jsonl=model-selection/prompts/rag_long_context.jsonl \
#     -n <namespace>
#   kubectl create secret generic aiperf-hf-token \
#     --from-literal=HF_TOKEN=hf_xxx \
#     -n <namespace>
#   # Only needed if TOKENIZER_PATH points at a gated/private HF repo (e.g.
#   # meta-llama/*); otherwise omit the secret and leave HF_TOKEN unset below.
#   kubectl apply -f model-selection/k8s/rag-long-context-job.yaml -n <namespace>
#
# Retrieve results after completion:
#   kubectl cp <namespace>/<pod-name>:/artifacts/rag-long-context ./results/rag-long-context/
#   (or read directly from the PVC if reused by a later Job/pod)
#
# Required edits before applying:
#   - image: pin to the exact NGC AIPerf tag you're using
#   - env.MODEL / env.URL: set to the target model and endpoint
#   - aiperf-hf-token secret: only needed if TOKENIZER_PATH is a gated/private
#     HF repo; the HF_TOKEN env is marked optional so the Job still runs fine
#     without the secret present
---
apiVersion: batch/v1
kind: Job
metadata:
  name: aiperf-rag-long-context
  labels:
    app.kubernetes.io/part-of: genai-load-performance-testing
    app.kubernetes.io/component: model-selection
    scenario: rag-long-context
spec:
  backoffLimit: 0            # benchmark runs are not safe to blindly retry; investigate failures instead
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: genai-load-performance-testing
        app.kubernetes.io/component: model-selection
        scenario: rag-long-context
    spec:
      restartPolicy: Never
      containers:
        - name: aiperf
          image: nvcr.io/nvidia/ai-dynamo/aiperf:0.10.0   # TODO: pin to the exact NGC AIPerf image tag
          command: ["/bin/bash", "/scripts/run_rag_long_context.sh"]
          env:
            # ---- Required: target model/endpoint --------------------------
            - name: MODEL
              value: "<model-name>"                        # TODO: e.g. meta/llama-3.1-8b-instruct
            - name: URL
              value: "<http://host:port>"                  # TODO: in-cluster Service DNS or external URL
            - name: ENDPOINT_TYPE
              value: "chat"
            - name: ENDPOINT_PATH
              value: "/v1/chat/completions"

            # ---- Scenario parameters (RAG / Long-Context Q&A, V1 baseline) -
            # See docs/scenarios/model-selection.md — keep in sync if changed.
            - name: CONCURRENCY
              value: "1"                                   # baseline; sweep: 1/5/10/25
            - name: OUTPUT_TOKENS_MEAN
              value: "250"
            - name: WARMUP_REQUESTS
              value: "10"
            - name: RANDOM_SEED
              value: "42"

            # ---- Non-interactive requirements ------------------------------
            # Must be set (even if empty) so the script's `read -p` prompts
            # are skipped — there is no TTY/stdin in a pod.
            - name: TOKENIZER_PATH
              value: "mradermacher/granite-3.3-8b-instruct-abliterated-i1-GGUF"     
            - name: TOKENIZER_TRUST_REMOTE_CODE
              value: "1"  
            - name: HF_HOME
              value: "/tmp/hf-cache"                                   # local mounted dir, or a HF repo id (e.g. ibm-granite/granite-3.1-8b-instruct) if --model doesn't resolve uniquely on the Hub; leave empty to use MODEL as-is
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aiperf-hf-token                     # TODO: remove this env entry if TOKENIZER_PATH is not a gated/private HF repo
                  key: HF_TOKEN
                  optional: true
            - name: INPUT_FILE
              value: "/prompts/rag_long_context.jsonl"
            - name: OUTPUT_DIR
              value: "/artifacts/rag-long-context"          # subpath on the shared suite PVC — keep unique per scenario
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: prompts
              mountPath: /prompts
              readOnly: true
            - name: artifacts
              mountPath: /artifacts
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: script
          configMap:
            name: aiperf-rag-long-context-script
            defaultMode: 0755
        - name: prompts
          configMap:
            name: aiperf-rag-long-context-prompts
        - name: artifacts
          persistentVolumeClaim:
            claimName: aiperf-model-selection-results   # shared across all model-selection scenarios, see results-pvc.yaml
